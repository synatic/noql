name: "NPM Publish"

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      # Skip post-install scripts here, as a malicious
      # script could steal NODE_AUTH_TOKEN.
      - name: Install NPM dependencies
        run: npm install --ignore-scripts

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test-ci

  publish-npm:
    name: NPM Publish
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      # Skip post-install scripts here, as a malicious
      # script could steal NODE_AUTH_TOKEN.
      - name: Install NPM dependencies
        run: npm install --ignore-scripts --production

      - name: Resolve npm dist-tag
        id: npm-tag
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          CURRENT_MAJOR=${CURRENT_VERSION%%.*}
          LATEST_VERSION=$(npm view "$PACKAGE_NAME" dist-tags.latest)
          LATEST_MAJOR=${LATEST_VERSION%%.*}

          if [ "$CURRENT_MAJOR" -lt "$LATEST_MAJOR" ]; then
            NPM_TAG="v$CURRENT_MAJOR"
          else
            NPM_TAG="latest"
          fi

          echo "Publishing $PACKAGE_NAME@$CURRENT_VERSION with tag '$NPM_TAG'"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

      - name: Run NPM publish
        run: npm publish --access public --tag "${{ steps.npm-tag.outputs.npm_tag }}"

  docs:
    name: Build and Publish Docs
    needs: publish-npm
    uses: ./.github/workflows/ci-docs.yml
